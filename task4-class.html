<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

    <style>
        .container {
            background-color: skyblue;
            margin: 50px 10px 40px 10px;
            color: white;
            border-radius: 10px;
            padding: 10px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
        }

        .first {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .navbar a {
            text-decoration: none;
            color: white;
        }

        .content {
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
        }

        .content .text {
            width: 300px;
            margin: 20px 20px 50px 70px;
        }

        .content p {
            margin: 0 0 0 30px;
        }

        .content .image {
            margin: 20px;

        }

        .content button {
            margin: 30px;
            color: white;
            background-color: blue;
            padding: 3px 15px;
            border-radius: 13px;
            border: none;
        }
    </style>


</head>



<body>
    <div class="container">
        <div class="navbar">
            <ul class="first">
                <a href="">
                    <li><i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i></li>
                </a>
                <a href="">
                    <li>Home</li>
                </a>
                <a href="">
                    <li>Service</li>
                </a>
                <a href="">
                    <li>About</li>
                </a>
            </ul>

            <ul>
                <a href="">
                    <li>Contact Us</li>
                </a>
            </ul>

        </div>

        <div class="content">
            <div class="text">
                <h1>Simple<br> Web Design</h1>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Placeat quidem cupiditate laudantium
                    dolores deleniti aut repellat ab maxime at qui.</p>
                <button>Profile</button>

            </div>

            <div class="image">
                <img src="task4_background.jpg" alt="Hero image" height="300px" width="400px">
            </div>
        </div>

    </div>


</body>

</html>
